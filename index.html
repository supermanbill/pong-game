<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pong - 玩家對戰</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
      font-family: 'Courier New', monospace;
    }
    canvas { display: block; }
    
    #register-screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #register-screen.hidden { display: none; }
    
    .register-box {
      background: rgba(255,255,255,0.05);
      border: 2px solid #32dcdc;
      border-radius: 16px;
      padding: 40px 50px;
      text-align: center;
    }
    
    .register-box h1 { color: #32dcdc; font-size: 32px; margin-bottom: 10px; }
    .register-box p { color: #888; margin-bottom: 30px; font-size: 14px; }
    
    .register-box input {
      width: 250px;
      padding: 15px 20px;
      font-size: 20px;
      border: 2px solid #444;
      border-radius: 8px;
      background: #111;
      color: #fff;
      text-align: center;
      outline: none;
    }
    .register-box input:focus { border-color: #32dcdc; }
    
    .register-box button {
      display: block;
      width: 250px;
      margin: 20px auto 0;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      color: #000;
      background: linear-gradient(135deg, #32dcdc, #28a8a8);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .register-box button:hover { transform: scale(1.05); }
    .register-box .error { color: #ff5050; margin-top: 15px; font-size: 14px; }
    
    #continue-btn { background: linear-gradient(135deg, #32dcdc, #28a8a8) !important; }
    #rename-btn { background: linear-gradient(135deg, #ff9900, #ff7700) !important; color: #fff !important; }
  </style>
</head>
<body>

<div id="register-screen">
  <div class="register-box">
    <h1>🏓 PONG</h1>
    <p>請輸入你的名字開始遊戲</p>
    <input type="text" id="player-name" placeholder="你的名字" maxlength="15" autocomplete="off">
    <button id="start-btn">開始遊戲</button>
    <div id="existing-player-options" style="display:none; margin-top:15px;">
      <button id="continue-btn" style="background:#32dcdc;">是本人繼續玩</button>
      <button id="rename-btn" style="background:#ff9900; margin-top:8px;">新人重新命名</button>
    </div>
    <p class="error" id="name-error"></p>
  </div>
</div>

<canvas id="c"></canvas>

<script>
// ===== 常量 =====
const W = 800, H = 600, H_CANVAS = 710;
const PW = 12, PH = 90, PSPEED = 6;
const AI_SPEED = 2.2, AI_PRED = 0.12;
const BSIZE = 36, BSINIT = 3.5, BSMAX = 8, BACC = 0.2;
const WIN_SCORE = 7;
const DPAD_W = 150, DPAD_H = 76, DPAD_GAP = 20;
const DPAD_LX = W/2 - DPAD_W - DPAD_GAP/2;
const DPAD_RX = W/2 + DPAD_GAP/2;
const DPAD_Y = H + 17;

// ===== 玩家資料 =====
let playerName = '';
let highScore = 0;

// ===== 排行榜 =====
function getLeaderboard() { return JSON.parse(localStorage.getItem('pong-leaderboard') || '[]'); }
function saveLeaderboard(board) { localStorage.setItem('pong-leaderboard', JSON.stringify(board)); }
function updateLeaderboard(name, score) {
  let board = getLeaderboard();
  const p = board.find(x => x.name === name);
  if (p) { if (score > p.score) p.score = score; }
  else { board.push({ name, score }); }
  board.sort((a, b) => b.score - a.score);
  saveLeaderboard(board.slice(0, 10));
}
function getPlayerRank(name) { const idx = getLeaderboard().findIndex(p => p.name === name); return idx >= 0 ? idx + 1 : null; }
function isNameTaken(name) { return getLeaderboard().some(p => p.name.toLowerCase() === name.toLowerCase()); }

// ===== Canvas =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H_CANVAS;

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H_CANVAS);
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H_CANVAS * s) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ===== 音效 =====
let audioCtx;
function tone(freq, dur, vol = 0.4) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
const playTick = () => tone(350, 0.09, 0.3);
const playGo = () => { tone(523, 0.06, 0.5); setTimeout(() => tone(659, 0.06, 0.5), 60); setTimeout(() => tone(784, 0.22, 0.5), 120); };
const playHit = (s) => tone(400 + s * 30, 0.07, 0.2 + s * 0.05);
const playWin = () => [523,659,784,1047].forEach((f,i) => setTimeout(() => tone(f, i===3?0.5:0.1, 0.55), i*100));
const playLose = () => [440,392,349,262].forEach((f,i) => setTimeout(() => tone(f, i===3?0.6:0.14, 0.4), i*140));

// ===== 粒子 =====
class Particle {
  constructor(x, y, dir) {
    const ang = (Math.random() - 0.5) * Math.PI * 1.1;
    const spd = 2.5 + Math.random() * 5.5;
    this.x = x; this.y = y;
    this.vx = Math.cos(ang) * spd * dir;
    this.vy = Math.sin(ang) * spd;
    this.life = 1;
    this.decay = 0.035 + Math.random() * 0.04;
    this.col = [255,255,200];
    this.size = 2 + Math.floor(Math.random() * 4);
  }
  update() { this.x += this.vx; this.y += this.vy; this.vy += 0.25; this.vx *= 0.96; this.life -= this.decay; }
  draw() {
    if (this.life <= 0) return;
    ctx.fillStyle = `rgba(${(this.col[0]*this.life)|0},${(this.col[1]*this.life)|0},${(this.col[2]*this.life)|0},${this.life})`;
    ctx.beginPath(); ctx.arc(this.x, this.y, Math.max(1, this.size * this.life), 0, Math.PI*2); ctx.fill();
  }
}

// ===== 遊戲狀態 =====
let state = 'countdown';
let cdVal = 5, cdTick = 1, flashTimer = 0;
let shake = 0;
let particles = [], wallFlash = 0;

// 分數
let aiScore = 0;       // AI 回合得分（先到7獲勝）
let youHitScore = 0;    // 玩家回擊分數（持續累積）
let roundWinner = null; // 'ai' or 'you'
let totalScore = 0;
let isNewHighScore = false;

const ai = { x: 20, y: H/2 - PH/2 };
const you = { x: W - 20 - PW, y: H/2 - PH/2 };
const ball = { x: W/2, y: H/2, vx: BSINIT, vy: BSINIT, spd: BSINIT, cooldown: 0 };

// ===== 輸入 =====
const keys = {};
let touchUp = false, touchDown = false;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (state === 'gameover') { doReplay(); }
});
document.addEventListener('keyup', e => keys[e.key] = false);

function canvasPoint(x, y) {
  const r = canvas.getBoundingClientRect();
  return { x: (x - r.left) * (W / r.width), y: (y - r.top) * (H_CANVAS / r.height) };
}

canvas.addEventListener('mousedown', e => {
  const {x,y} = canvasPoint(e.clientX, e.clientY);
  if (state === 'gameover' && y < H) { doReplay(); return; }
  if (y >= DPAD_Y && y <= DPAD_Y + DPAD_H) {
    if (x >= DPAD_LX && x <= DPAD_LX + DPAD_W) touchUp = true;
    if (x >= DPAD_RX && x <= DPAD_RX + DPAD_W) touchDown = true;
  }
});
canvas.addEventListener('mouseup', () => { touchUp = false; touchDown = false; });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'gameover') { doReplay(); return; }
  Array.from(e.touches).forEach(t => {
    const {x,y} = canvasPoint(t.clientX, t.clientY);
    if (y >= DPAD_Y && y <= DPAD_Y + DPAD_H) {
      if (x >= DPAD_LX && x <= DPAD_LX + DPAD_W) touchUp = true;
      if (x >= DPAD_RX && x <= DPAD_RX + DPAD_W) touchDown = true;
    }
  });
}, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); touchUp = false; touchDown = false; }, { passive: false });

// ===== 遊戲邏輯 =====
function resetBall(dir = 1) {
  ball.x = W/2; ball.y = H/2;
  ball.spd = BSINIT;
  ball.vx = BSINIT * dir;
  ball.vy = BSINIT * (dir > 0 ? 1 : -1);
  ball.cooldown = 0;
}

function doReplay() {
  aiScore = 0;
  youHitScore = 0;
  roundWinner = null;
  totalScore = 0;
  isNewHighScore = false;
  playerScore = 0;
  computerScore = 0;
  particles = [];
  state = 'countdown'; cdVal = 5; cdTick = 1;
  shake = 0; wallFlash = 0;
  resetBall(1);
  playTick();
}

let playerScore = 0;
let computerScore = 0;

function update2(dt) {
  if (state === 'countdown') {
    cdTick -= dt;
    if (cdTick <= 0) { cdVal--; cdTick = 1; if (cdVal >= 0) playTick(); if (cdVal < 0) { state = 'start_flash'; flashTimer = 0.75; playGo(); } }
  } else if (state === 'start_flash') {
    flashTimer -= dt;
    if (flashTimer <= 0) state = 'playing';
  } else if (state === 'playing') {
    // AI
    if (ball.vx < 0) {
      const t = (ai.x + PW/2 - ball.x) / ball.vx;
      let py = Math.max(0, Math.min(H, ball.y + ball.vy * t * AI_PRED));
      ai.y += Math.sign(py - (ai.y + PH/2)) * Math.min(Math.abs(py - (ai.y + PH/2)), AI_SPEED);
    } else {
      ai.y += Math.sign(H/2 - (ai.y + PH/2)) * Math.min(Math.abs(H/2 - (ai.y + PH/2)), AI_SPEED);
    }
    ai.y = Math.max(0, Math.min(H - PH, ai.y));

    // 玩家
    if (keys['ArrowUp'] || touchUp) you.y -= PSPEED;
    if (keys['ArrowDown'] || touchDown) you.y += PSPEED;
    you.y = Math.max(0, Math.min(H - PH, you.y));

    // 球
    ball.x += ball.vx; ball.y += ball.vy;
    if (ball.y <= BSIZE/2 || ball.y >= H - BSIZE/2) {
      ball.vy = Math.abs(ball.vy) * (ball.y <= BSIZE/2 ? 1 : -1);
      wallFlash = 1;
    }
    wallFlash = Math.max(0, wallFlash - dt * 4);

    // 碰撞
    const br = { l: ball.x-BSIZE/2, r: ball.x+BSIZE/2, t: ball.y-BSIZE/2, b: ball.y+BSIZE/2 };
    const paddleRect = p => ({ l: p.x, r: p.x+PW, t: p.y, b: p.y+PH });
    const hit = (a, b) => a.l<b.r && a.r>b.l && a.t<b.b && a.b>b.t;

    function hitPaddle(p) {
      const rel = Math.max(-1, Math.min(1, (ball.y - (p.y+PH/2)) / (PH/2)));
      ball.spd = Math.min(ball.spd + BACC, BSMAX);
      ball.vx = -ball.spd;
      ball.vy = ball.spd * rel;
      if (p === you) youHitScore++;
    }

    // 碰撞檢測 - 終極簡化版（只用位置判斷）
    // AI 拍子（在左邊）
    if (ball.x <= ai.x + PW + BSIZE && ball.x >= ai.x - BSIZE && ball.y >= ai.y - BSIZE && ball.y <= ai.y + PH + BSIZE) {
      if (ball.vx < 0) {
        ball.vx = Math.abs(ball.spd);
        ball.x = ai.x + PW + BSIZE + 2;
        youHitScore++;
        shake = 6; playHit(ball.spd); for(let i=0;i<14;i++)particles.push(new Particle(ball.x,ball.y,1));
      }
    }
    // 玩家拍子（在右邊）
    if (ball.x >= you.x - BSIZE && ball.x <= you.x + PW + BSIZE && ball.y >= you.y - BSIZE && ball.y <= you.y + PH + BSIZE) {
      if (ball.vx > 0) {
        ball.vx = -Math.abs(ball.spd);
        ball.x = you.x - BSIZE - 2;
        youHitScore++;
        shake = 6; playHit(ball.spd); for(let i=0;i<14;i++)particles.push(new Particle(ball.x,ball.y,-1));
      }
    }

    // 得分 - 修正
    // ball.x < 0 = 球向左出界 = AI 沒接到 = 玩家得分 (playerScore++)
    // ball.x > W = 球向右出界 = 玩家沒接到 = AI 得分 (computerScore++)
    if (ball.x < 0) { 
      playerScore++;
      particles=[]; resetBall(-1);
    }
    if (ball.x > W) { 
      computerScore++;
      particles=[]; resetBall(1);
    }

    // 遊戲結束
    if (playerScore >= WIN_SCORE) {
      roundWinner = 'you';
      totalScore = youHitScore * 5;
      if (totalScore > highScore) { highScore = totalScore; isNewHighScore = true; }
      updateLeaderboard(playerName, totalScore);
      state = 'gameover';
      playWin();
    } else if (computerScore >= WIN_SCORE) {
      roundWinner = 'ai';
      totalScore = youHitScore;
      if (totalScore > highScore) { highScore = totalScore; isNewHighScore = true; }
      updateLeaderboard(playerName, totalScore);
      state = 'gameover';
      playLose();
    }

    particles.forEach(p => p.update());
    particles = particles.filter(p => p.life > 0);
  }
}

// 使用 update2 作為主要的 update 函數
function update(dt) { update2(dt); }

// ===== 繪製小紅魚 =====
function drawFish(x, y, vx) {
  const size = BSIZE / 2; // 半徑
  const direction = vx > 0 ? 1 : -1; // 根據球的方向決定魚頭方向
  
  ctx.save();
  ctx.translate(x, y);
  if (direction < 0) ctx.scale(-1, 1); // 向左飛時翻轉
  
  // 魚身（紅色圓形）
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.ellipse(0, 0, size * 0.9, size * 0.7, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // 魚尾（三角形）
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.moveTo(-size * 0.7, 0);
  ctx.lineTo(-size * 1.4, -size * 0.6);
  ctx.lineTo(-size * 1.4, size * 0.6);
  ctx.closePath();
  ctx.fill();
  
  // 魚眼（白色底）
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(size * 0.3, -size * 0.1, size * 0.35, 0, Math.PI * 2);
  ctx.fill();
  
  // 魚眼（黑色瞳孔）
  ctx.fillStyle = '#000000';
  ctx.beginPath();
  ctx.arc(size * 0.4, -size * 0.1, size * 0.15, 0, Math.PI * 2);
  ctx.fill();
  
  // 魚鰭（背鰭）
  ctx.fillStyle = '#ff6666';
  ctx.beginPath();
  ctx.moveTo(0, -size * 0.6);
  ctx.lineTo(size * 0.2, -size * 1.0);
  ctx.lineTo(-size * 0.2, -size * 0.6);
  ctx.closePath();
  ctx.fill();
  
  ctx.restore();
}

// ===== 繪製 =====
function draw() {
  let ox = 0, oy = 0;
  if (shake > 0) { ox = (Math.random()-0.5)*8; oy = (Math.random()-0.5)*8; shake--; }

  ctx.save(); ctx.translate(ox, oy);
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);

  // 中線
  ctx.fillStyle = '#3c3c3c';
  for (let y = 0; y < H; y += 26) ctx.fillRect(W/2 - 1, y, 2, 16);

  // 牆壁
  ctx.fillStyle = wallFlash > 0.05 ? `rgba(255,255,200,${wallFlash * 0.5})` : 'rgba(200,200,200,0.35)';
  ctx.fillRect(0, 0, W, 6);
  ctx.fillRect(0, H-6, W, 6);

  // 擋板
  ctx.fillStyle = '#32dcdc'; ctx.fillRect(ai.x, ai.y, PW, PH);
  ctx.fillStyle = '#ffe632'; ctx.fillRect(you.x, you.y, PW, PH);

  // 球 - 小紅魚
  if (state === 'playing' || state === 'gameover') {
    drawFish(ball.x, ball.y, ball.vx);
  }

  // 粒子
  particles.forEach(p => p.draw());

  // D-Pad
  ctx.fillStyle = '#070707'; ctx.fillRect(0, H, W, H_CANVAS - H);
  [[DPAD_LX, touchUp, true], [DPAD_RX, touchDown, false]].forEach(([x, active, isUp]) => {
    ctx.fillStyle = active ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.18)';
    ctx.fillRect(x, DPAD_Y, DPAD_W, DPAD_H);
    ctx.fillStyle = active ? '#ffe632' : '#999';
    const cx = x + DPAD_W/2, cy = DPAD_Y + DPAD_H/2;
    ctx.beginPath();
    if (isUp) { ctx.moveTo(cx, cy-14); ctx.lineTo(cx-20, cy+14); ctx.lineTo(cx+20, cy+14); }
    else { ctx.moveTo(cx, cy+14); ctx.lineTo(cx-20, cy-14); ctx.lineTo(cx+20, cy-14); }
    ctx.fill();
  });

  // 分數
  ctx.font = 'bold 64px monospace';
  ctx.fillStyle = '#32dcdc'; ctx.textAlign = 'right'; ctx.fillText(computerScore, W/2-80, 76);
  ctx.fillStyle = '#ffe632'; ctx.textAlign = 'left'; ctx.fillText(playerScore, W/2+80, 76);
  ctx.font = '22px monospace';
  ctx.fillStyle = '#32dcdc'; ctx.textAlign = 'right'; ctx.fillText('AI', W/2-80, 106);
  ctx.fillStyle = '#ffe632'; ctx.textAlign = 'left'; ctx.fillText('You', W/2+80, 106);
  
  if (state === 'playing') {
    ctx.font = '18px monospace'; ctx.fillStyle = '#888'; ctx.textAlign = 'left'; ctx.fillText('回擊: ' + youHitScore, W/2+80, 136);
  }

  // 遊戲狀態
  if (state === 'countdown') {
    ctx.fillStyle = 'rgba(0,0,0,0.43)'; ctx.fillRect(0,0,W,H);
    const scale = 1 + 0.25 * (cdTick / 0.25);
    ctx.save(); ctx.translate(W/2, H/2); ctx.scale(scale, scale);
    ctx.font = 'bold 130px monospace'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.fillText(Math.max(0, cdVal), 0, 55);
    ctx.restore();
  } else if (state === 'start_flash') {
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0,0,W,H);
    ctx.font = 'bold 120px monospace'; ctx.fillStyle = '#50ff82'; ctx.textAlign = 'center'; ctx.fillText('Start!', W/2, H/2+50);
  } else if (state === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,W,H);
    
    const winnerText = roundWinner === 'you' ? 'YOU WIN!' : 'AI WINS!';
    ctx.font = 'bold 48px monospace'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', W/2, 120);
    ctx.font = 'bold 28px monospace'; ctx.fillStyle = winnerText === 'YOU WIN!' ? '#50ffff' : '#ff5050'; ctx.fillText(winnerText, W/2, 160);
    
    const multiplier = roundWinner === 'you' ? 5 : 1;
    const scoreText = roundWinner === 'you' 
      ? `本局回擊 ${youHitScore} × ${multiplier} = ${totalScore} 分`
      : `本局回擊 ${youHitScore} = ${totalScore} 分`;
    ctx.font = '18px monospace'; ctx.fillStyle = '#ffe632'; ctx.fillText(scoreText, W/2, 195);
    
    if (isNewHighScore) {
      ctx.font = 'bold 22px monospace'; ctx.fillStyle = '#ff00ff'; ctx.fillText('🎉 新紀錄!', W/2, 225);
    }
    
    // 排行榜
    const board = getLeaderboard();
    const totalPlayers = board.length;
    
    // 總參與人數
    ctx.font = '16px monospace'; ctx.fillStyle = '#888'; ctx.textAlign = 'center'; 
    ctx.fillText(`🏅 總參與累積人數: ${totalPlayers} 人`, W/2, 260);
    
    // 我的排名和分數（無論有沒有上榜都顯示）
    if (playerName) {
      const myRank = getPlayerRank(playerName);
      const myScore = board.find(p => p.name === playerName)?.score || 0;
      ctx.font = 'bold 18px monospace'; ctx.fillStyle = '#32dcdc'; ctx.textAlign = 'center'; 
      ctx.fillText(`你的總分: ${myScore} 分 | 排名: #${myRank || '-'}`, W/2, 290);
    }
    
    // 排行榜標題
    ctx.font = 'bold 22px monospace'; ctx.fillStyle = '#ffe632'; ctx.textAlign = 'center'; ctx.fillText('🏆 英雄榜 TOP 10', W/2, 330);
    
    board.forEach((p, i) => {
      const y = 360 + i * 26;
      if (y > H - 80) return;
      ctx.font = '16px monospace';
      if (i === 0) ctx.fillStyle = '#ffd700';
      else if (i === 1) ctx.fillStyle = '#c0c0c0';
      else if (i === 2) ctx.fillStyle = '#cd7f32';
      else ctx.fillStyle = '#888';
      ctx.textAlign = 'left';
      ctx.fillText(`${i+1}. ${p.name}`, W/2 - 80, y);
      ctx.textAlign = 'right';
      ctx.fillText(p.score + ' 分', W/2 + 80, y);
    });
    
    // 按任意鍵重新開始
    ctx.font = 'bold 18px monospace'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.fillText('▼ 按任意鍵重新開始 ▼', W/2, H-30);
    
    ctx.restore();
}

// ===== 迴圈 =====
let last = 0;
function loop(ts) {
  update(Math.min((ts - last) / 1000, 0.05));
  draw();
  last = ts;
  requestAnimationFrame(loop);
}

// ===== 註冊 =====
let pendingName = ''; // 儲存待確認的名字

document.getElementById('start-btn').addEventListener('click', () => {
  const name = document.getElementById('player-name').value.trim();
  if (!name) { document.getElementById('name-error').textContent = '請輸入名字'; return; }
  if (name.length > 15) { document.getElementById('name-error').textContent = '名字最多 15 個字'; return; }
  
  if (isNameTaken(name)) {
    // 顯示選項按鈕
    pendingName = name;
    document.getElementById('name-error').textContent = '此名字已存在';
    document.getElementById('existing-player-options').style.display = 'block';
    document.getElementById('start-btn').style.display = 'none';
    return;
  }
  
  startGame(name);
});

// 繼續遊戲（本人）
document.getElementById('continue-btn').addEventListener('click', () => {
  if (pendingName) {
    startGame(pendingName);
  }
});

// 重新命名（新人）
document.getElementById('rename-btn').addEventListener('click', () => {
  pendingName = '';
  document.getElementById('player-name').value = '';
  document.getElementById('name-error').textContent = '請使用不同名字';
  document.getElementById('existing-player-options').style.display = 'none';
  document.getElementById('start-btn').style.display = 'block';
  document.getElementById('player-name').focus();
});

function startGame(name) {
  playerName = name;
  const board = getLeaderboard();
  const p = board.find(x => x.name === name);
  highScore = p ? p.score : 0;
  
  // 隱藏註冊畫面
  document.getElementById('register-screen').style.display = 'none';
  
  // 重置遊戲狀態
  state = 'countdown';
  cdVal = 5;
  cdTick = 1;
  playerScore = 0;
  computerScore = 0;
  youHitScore = 0;
  resetBall(1);
  
  // 確保 last 是正確的時間
  last = performance.now();
  
  // 開始遊戲迴圈
  playTick();
  requestAnimationFrame(loop);
}

document.getElementById('player-name').addEventListener('keypress', e => { 
  if (e.key === 'Enter') document.getElementById('start-btn').click(); 
});
</script>
</body>
