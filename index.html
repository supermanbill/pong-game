<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pong - 玩家對戰</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; touch-action: none; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #register-screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%); display: flex; justify-content: center; align-items: center; z-index: 100; }
    #register-screen.hidden { display: none; }
    .register-box { background: rgba(255,255,255,0.05); border: 2px solid #32dcdc; border-radius: 16px; padding: 40px 50px; text-align: center; }
    .register-box h1 { color: #32dcdc; font-size: 32px; margin-bottom: 10px; }
    .register-box .subtitle { color: #888; margin-bottom: 30px; font-size: 14px; }
    .register-box input { width: 250px; padding: 15px 20px; font-size: 20px; border: 2px solid #444; border-radius: 8px; background: #111; color: #fff; text-align: center; outline: none; }
    .register-box input:focus { border-color: #32dcdc; }
    .register-box button { display: block; width: 250px; margin: 20px auto 0; padding: 15px; font-size: 18px; font-weight: bold; color: #000; background: linear-gradient(135deg, #32dcdc, #28a8a8); border: none; border-radius: 8px; cursor: pointer; }
    .register-box button:hover { transform: scale(1.05); }
    .register-box .error { color: #ff5050; margin-top: 15px; font-size: 14px; }
    
    /* 驗證畫面 */
    #verify-screen { display: none; flex-direction: column; align-items: center; }
    #verify-screen.show { display: flex; }
    .verify-box { background: rgba(255,255,255,0.05); border: 2px solid #ffe632; border-radius: 16px; padding: 30px 40px; text-align: center; margin-bottom: 20px; }
    .verify-box p { color: #fff; font-size: 18px; margin-bottom: 20px; }
    .verify-box .name-display { color: #ffe632; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
    .verify-buttons { display: flex; gap: 15px; justify-content: center; }
    .verify-buttons button { width: 120px; margin: 0; }
    .verify-buttons .yes-btn { background: linear-gradient(135deg, #32dcdc, #28a8a8); }
    .verify-buttons .no-btn { background: linear-gradient(135deg, #ff5050, #cc4040); }
    
    /* 靜音按鈕 */
    #mute-btn { position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.1); border: 1px solid #444; border-radius: 8px; padding: 8px 12px; color: #888; cursor: pointer; font-size: 20px; z-index: 50; }
    #mute-btn:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

<button id="mute-btn" onclick="toggleMute()">🔊</button>

<div id="register-screen">
  <!-- 註冊畫面 -->
  <div id="register-form">
    <div class="register-box">
      <h1>🏓 PONG</h1>
      <p class="subtitle">請輸入你的名字開始遊戲</p>
      <input type="text" id="player-name" placeholder="你的名字" maxlength="15" autocomplete="off">
      <button id="start-btn">開始遊戲</button>
      <p class="error" id="name-error"></p>
    </div>
  </div>
  
  <!-- 驗證畫面 -->
  <div id="verify-screen">
    <div class="verify-box">
      <p>這個名字已經存在</p>
      <div class="name-display" id="verify-name"></div>
      <p>請問這是你嗎？</p>
      <div class="verify-buttons">
        <button class="yes-btn" id="verify-yes">是本人</button>
        <button class="no-btn" id="verify-no">不是</button>
      </div>
    </div>
  </div>
</div>

<canvas id="c"></canvas>

<script>
// ===== 常量 =====
const W = 800, H = 600, H_CANVAS = 710;
const PW = 12, PH = 90, PSPEED = 6;
const AI_SPEED = 4.0, AI_PRED = 0.5;
const BSIZE = 12, BSINIT = 3.5, BSMAX = 8, BACC = 0.2;
const WIN_SCORE = 7;
const DPAD_W = 150, DPAD_H = 76, DPAD_GAP = 20;
const DPAD_LX = W/2 - DPAD_W - DPAD_GAP/2;
const DPAD_RX = W/2 + DPAD_GAP/2;
const DPAD_Y = H + 17;

// ===== 玩家資料 =====
let playerName = '';
let highScore = 0;

// ===== 儲存功能 =====
function getSavedName() { return localStorage.getItem('pong-player-name') || ''; }
function savePlayerName(name) { localStorage.setItem('pong-player-name', name); }

function getLeaderboard() { return JSON.parse(localStorage.getItem('pong-leaderboard') || '[]'); }
function saveLeaderboard(board) { localStorage.setItem('pong-leaderboard', JSON.stringify(board)); }
function updateLeaderboard(name, score) {
  let board = getLeaderboard();
  const p = board.find(x => x.name === name);
  if (p) { if (score > p.score) p.score = score; }
  else { board.push({ name, score }); }
  board.sort((a, b) => b.score - a.score);
  saveLeaderboard(board.slice(0, 10));
}
function getPlayerScore(name) {
  const board = getLeaderboard();
  const p = board.find(x => x.name === name);
  return p ? p.score : 0;
}

// ===== Canvas =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H_CANVAS;

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H_CANVAS);
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H_CANVAS * s) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ===== 音效 =====
let audioCtx;
let audioMuted = false;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

function tone(freq, dur, vol = 0.4) {
  if (audioMuted) return;
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

function toggleMute() {
  audioMuted = !audioMuted;
  document.getElementById('mute-btn').textContent = audioMuted ? '🔇' : '🔊';
  if (!audioMuted) initAudio();
}
const playTick = () => tone(350, 0.09, 0.3);
const playGo = () => { tone(523, 0.06, 0.5); setTimeout(() => tone(659, 0.06, 0.5), 60); setTimeout(() => tone(784, 0.22, 0.5), 120); };
const playHit = (s) => tone(400 + s * 30, 0.07, 0.2 + s * 0.05);
const playWin = () => [523,659,784,1047].forEach((f,i) => setTimeout(() => tone(f, i===3?0.5:0.1, 0.55), i*100));
const playLose = () => [440,392,349,262].forEach((f,i) => setTimeout(() => tone(f, i===3?0.6:0.14, 0.4), i*140));

// ===== 粒子 =====
class Particle {
  constructor(x, y, dir) {
    const ang = (Math.random() - 0.5) * Math.PI * 1.1;
    const spd = 2.5 + Math.random() * 5.5;
    this.x = x; this.y = y;
    this.vx = Math.cos(ang) * spd * dir;
    this.vy = Math.sin(ang) * spd;
    this.life = 1;
    this.decay = 0.035 + Math.random() * 0.04;
    this.col = [255,255,200];
    this.size = 2 + Math.floor(Math.random() * 4);
  }
  update() { this.x += this.vx; this.y += this.vy; this.vy += 0.25; this.vx *= 0.96; this.life -= this.decay; }
  draw() {
    if (this.life <= 0) return;
    ctx.fillStyle = `rgba(${(this.col[0]*this.life)|0},${(this.col[1]*this.life)|0},${(this.col[2]*this.life)|0},${this.life})`;
    ctx.beginPath(); ctx.arc(this.x, this.y, Math.max(1, this.size * this.life), 0, Math.PI*2); ctx.fill();
  }
}

// ===== 遊戲狀態 =====
let state = 'countdown';
let cdVal = 5, cdTick = 1, flashTimer = 0;
let shake = 0;
let particles = [], wallFlash = 0;

// 分數
let playerScore = 0;
let aiScore = 0;
let youHitScore = 0;
let roundWinner = null;
let totalScore = 0;
let isNewHighScore = false;

const ai = { x: 20, y: H/2 - PH/2 };
const you = { x: W - 20 - PW, y: H/2 - PH/2 };
const ball = { x: W/2, y: H/2, vx: BSINIT, vy: 0, spd: BSINIT };

// ===== 輸入 =====
const keys = {};
let touchUp = false, touchDown = false;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (state === 'gameover' && e.key === ' ') doReplay();
});
document.addEventListener('keyup', e => keys[e.key] = false);

function canvasPoint(x, y) {
  const r = canvas.getBoundingClientRect();
  return { x: (x - r.left) * (W / r.width), y: (y - r.top) * (H_CANVAS / r.height) };
}

canvas.addEventListener('mousedown', e => {
  const {x,y} = canvasPoint(e.clientX, e.clientY);
  if (state === 'gameover' && y < H) { doReplay(); return; }
  if (y >= DPAD_Y && y <= DPAD_Y + DPAD_H) {
    if (x >= DPAD_LX && x <= DPAD_LX + DPAD_W) touchUp = true;
    if (x >= DPAD_RX && x <= DPAD_RX + DPAD_W) touchDown = true;
  }
});
canvas.addEventListener('mouseup', () => { touchUp = false; touchDown = false; });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'gameover') { doReplay(); return; }
  Array.from(e.touches).forEach(t => {
    const {x,y} = canvasPoint(t.clientX, t.clientY);
    if (y >= DPAD_Y && y <= DPAD_Y + DPAD_H) {
      if (x >= DPAD_LX && x <= DPAD_LX + DPAD_W) touchUp = true;
      if (x >= DPAD_RX && x <= DPAD_RX + DPAD_W) touchDown = true;
    }
  });
}, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); touchUp = false; touchDown = false; }, { passive: false });

// ===== 遊戲邏輯 =====
function resetBall(dir) {
  ball.x = W / 2;
  ball.y = H / 2 + (Math.random() - 0.5) * 200;
  ball.spd = BSINIT;
  ball.vx = ball.spd * dir;
  ball.vy = (Math.random() - 0.5) * ball.spd * 0.4;
}

function doReplay() {
  playerScore = 0;
  aiScore = 0;
  youHitScore = 0;
  roundWinner = null;
  totalScore = 0;
  isNewHighScore = false;
  particles = [];
  state = 'countdown';
  cdVal = 5;
  cdTick = 1;
  shake = 0;
  wallFlash = 0;
  resetBall(1);
  playTick();
}

function update(dt) {
  if (state === 'countdown') {
    cdTick -= dt;
    if (cdTick <= 0) {
      cdVal--;
      cdTick = 1;
      if (cdVal >= 0) playTick();
      if (cdVal < 0) {
        state = 'start_flash';
        flashTimer = 0.75;
        playGo();
      }
    }
  } else if (state === 'start_flash') {
    flashTimer -= dt;
    if (flashTimer <= 0) state = 'playing';
  } else if (state === 'playing') {
    
    // AI 移動
    let targetY = ball.y;
    if (ball.vx < 0) {
      targetY = ball.y + ball.vy * AI_PRED * 3;
    }
    targetY = Math.max(0, Math.min(H - PH, targetY));
    const aiDiff = targetY - (ai.y + PH/2);
    ai.y += Math.sign(aiDiff) * Math.min(Math.abs(aiDiff), AI_SPEED);

    // 玩家移動
    if (keys['ArrowUp'] || touchUp) you.y -= PSPEED;
    if (keys['ArrowDown'] || touchDown) you.y += PSPEED;
    you.y = Math.max(0, Math.min(H - PH, you.y));

    // 球移動
    ball.x += ball.vx;
    ball.y += ball.vy;

    // 上下牆壁
    if (ball.y <= BSIZE/2) {
      ball.y = BSIZE/2;
      ball.vy = Math.abs(ball.vy);
      wallFlash = 1;
    }
    if (ball.y >= H - BSIZE/2) {
      ball.y = H - BSIZE/2;
      ball.vy = -Math.abs(ball.vy);
      wallFlash = 1;
    }
    wallFlash = Math.max(0, wallFlash - dt * 4);

    // 碰撞檢測
    const ballLeft = ball.x - BSIZE/2;
    const ballRight = ball.x + BSIZE/2;
    const ballTop = ball.y - BSIZE/2;
    const ballBottom = ball.y + BSIZE/2;

    // AI 擋板
    if (ballLeft < ai.x + PW && ballRight > ai.x && ballTop < ai.y + PH && ballBottom > ai.y) {
      if (ball.vx < 0) {
        ball.x = ai.x + PW + BSIZE/2;
        const rel = (ball.y - (ai.y + PH/2)) / (PH/2);
        ball.spd = Math.min(ball.spd + BACC, BSMAX);
        ball.vx = ball.spd;
        ball.vy = ball.spd * Math.max(-0.8, Math.min(0.8, rel));
        shake = 6;
        playHit(ball.spd);
        for (let i = 0; i < 10; i++) particles.push(new Particle(ball.x, ball.y, -1));
      }
    }

    // 玩家擋板
    if (ballRight > you.x && ballLeft < you.x + PW && ballTop < you.y + PH && ballBottom > you.y) {
      if (ball.vx > 0) {
        ball.x = you.x - BSIZE/2;
        const rel = (ball.y - (you.y + PH/2)) / (PH/2);
        ball.spd = Math.min(ball.spd + BACC, BSMAX);
        ball.vx = -ball.spd;
        ball.vy = ball.spd * Math.max(-0.8, Math.min(0.8, rel));
        youHitScore++;
        shake = 6;
        playHit(ball.spd);
        for (let i = 0; i < 10; i++) particles.push(new Particle(ball.x, ball.y, 1));
      }
    }

    // 得分
    if (ball.x < -BSIZE) {
      playerScore++;
      particles = [];
      resetBall(-1);
    }
    if (ball.x > W + BSIZE) {
      aiScore++;
      particles = [];
      resetBall(1);
    }

    // 遊戲結束
    if (playerScore >= WIN_SCORE) {
      roundWinner = 'you';
      totalScore = youHitScore * 5;
      if (totalScore > highScore) { highScore = totalScore; isNewHighScore = true; }
      updateLeaderboard(playerName, totalScore);
      state = 'gameover';
      playWin();
    } else if (aiScore >= WIN_SCORE) {
      roundWinner = 'ai';
      totalScore = youHitScore;
      if (totalScore > highScore) { highScore = totalScore; isNewHighScore = true; }
      updateLeaderboard(playerName, totalScore);
      state = 'gameover';
      playLose();
    }

    particles.forEach(p => p.update());
    particles = particles.filter(p => p.life > 0);
  }
}

// ===== 繪製 =====
// ===== 背景圖片 =====
const bgImage = new Image();
bgImage.src = 'background.png';

function draw() {
  let ox = 0, oy = 0;
  if (shake > 0) { ox = (Math.random() - 0.5) * 8; oy = (Math.random() - 0.5) * 8; shake--; }

  ctx.save();
  ctx.translate(ox, oy);
  
  // 繪製背景圖片
  if (bgImage.complete) {
    ctx.drawImage(bgImage, 0, 0, W, H);
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)'; // 半透明遮罩
    ctx.fillRect(0, 0, W, H);
  } else {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);
  }

  // 中線
  ctx.fillStyle = '#3c3c3c';
  for (let y = 0; y < H; y += 26) ctx.fillRect(W/2 - 1, y, 2, 16);

  // 牆壁
  ctx.fillStyle = wallFlash > 0.05 ? `rgba(255,255,200,${wallFlash * 0.5})` : 'rgba(200,200,200,0.35)';
  ctx.fillRect(0, 0, W, 6);
  ctx.fillRect(0, H - 6, W, 6);

  // 擋板
  ctx.fillStyle = '#32dcdc';
  ctx.fillRect(ai.x, ai.y, PW, PH);
  ctx.fillStyle = '#ffe632';
  ctx.fillRect(you.x, you.y, PW, PH);

  // 球
  if (state === 'playing' || state === 'gameover') {
    ctx.fillStyle = '#ffff00';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, BSIZE/2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ball.x - 2, ball.y - 2, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // 粒子
  particles.forEach(p => p.draw());

  // D-Pad
  ctx.fillStyle = '#070707';
  ctx.fillRect(0, H, W, H_CANVAS - H);
  [[DPAD_LX, touchUp, true], [DPAD_RX, touchDown, false]].forEach(([x, active, isUp]) => {
    ctx.fillStyle = active ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.18)';
    ctx.fillRect(x, DPAD_Y, DPAD_W, DPAD_H);
    ctx.fillStyle = active ? '#ffe632' : '#999';
    const cx = x + DPAD_W / 2, cy = DPAD_Y + DPAD_H / 2;
    ctx.beginPath();
    if (isUp) { ctx.moveTo(cx, cy - 14); ctx.lineTo(cx - 20, cy + 14); ctx.lineTo(cx + 20, cy + 14); }
    else { ctx.moveTo(cx, cy + 14); ctx.lineTo(cx - 20, cy - 14); ctx.lineTo(cx + 20, cy - 14); }
    ctx.fill();
  });

  // 分數
  ctx.font = 'bold 64px monospace';
  ctx.fillStyle = '#32dcdc';
  ctx.textAlign = 'right';
  ctx.fillText(aiScore, W/2 - 80, 76);
  ctx.fillStyle = '#ffe632';
  ctx.textAlign = 'left';
  ctx.fillText(playerScore, W/2 + 80, 76);
  ctx.font = '22px monospace';
  ctx.fillStyle = '#32dcdc';
  ctx.textAlign = 'right';
  ctx.fillText('AI', W/2 - 80, 106);
  ctx.fillStyle = '#ffe632';
  ctx.textAlign = 'left';
  ctx.fillText('You', W/2 + 80, 106);

  if (state === 'playing') {
    ctx.font = '18px monospace';
    ctx.fillStyle = '#888';
    ctx.textAlign = 'left';
    ctx.fillText('回擊: ' + youHitScore, W/2 + 80, 136);
  }

  // 遊戲狀態
  if (state === 'countdown') {
    ctx.fillStyle = 'rgba(0,0,0,0.43)';
    ctx.fillRect(0, 0, W, H);
    const scale = 1 + 0.25 * (cdTick / 0.25);
    ctx.save();
    ctx.translate(W/2, H/2);
    ctx.scale(scale, scale);
    ctx.font = 'bold 130px monospace';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText(Math.max(0, cdVal), 0, 55);
    ctx.restore();
  } else if (state === 'start_flash') {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = 'bold 120px monospace';
    ctx.fillStyle = '#50ff82';
    ctx.textAlign = 'center';
    ctx.fillText('Start!', W/2, H/2 + 50);
  } else if (state === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0, 0, W, H);

    const winnerText = roundWinner === 'you' ? 'YOU WIN!' : 'AI WINS!';
    ctx.font = 'bold 62px monospace';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, H/2 - 100);
    ctx.font = 'bold 34px monospace';
    ctx.fillStyle = winnerText === 'YOU WIN!' ? '#50ffff' : '#ff5050';
    ctx.fillText(winnerText, W/2, H/2 - 50);

    const multiplier = roundWinner === 'you' ? 5 : 1;
    const scoreText = roundWinner === 'you' 
      ? `回擊 ${youHitScore} × ${multiplier} = ${totalScore}`
      : `回擊 ${youHitScore} = ${totalScore}`;
    ctx.font = '22px monospace';
    ctx.fillStyle = '#ffe632';
    ctx.fillText(scoreText, W/2, H/2 - 10);

    if (isNewHighScore) {
      ctx.font = 'bold 28px monospace';
      ctx.fillStyle = '#ff00ff';
      ctx.fillText('🎉 新紀錄!', W/2, H/2 + 30);
    }

    // 排行榜
    const board = getLeaderboard();
    ctx.font = 'bold 24px monospace';
    ctx.fillStyle = '#ffe632';
    ctx.textAlign = 'center';
    ctx.fillText('🏆 排行榜', W/2, H/2 + 70);

    board.forEach((p, i) => {
      const y = H/2 + 105 + i * 28;
      if (y > H - 30) return;
      ctx.font = '18px monospace';
      if (i === 0) ctx.fillStyle = '#ffd700';
      else if (i === 1) ctx.fillStyle = '#c0c0c0';
      else if (i === 2) ctx.fillStyle = '#cd7f32';
      else ctx.fillStyle = '#888';
      ctx.textAlign = 'left';
      ctx.fillText(`${i + 1}. ${p.name}`, W/2 - 100, y);
      ctx.textAlign = 'right';
      ctx.fillText(p.score, W/2 + 100, y);
    });

    ctx.font = 'bold 22px monospace';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.fillText('按空白鍵重新開始', W/2, H - 30);
  }

  ctx.restore();
}

// ===== 迴圈 =====
let last = 0;
function loop(ts) {
  update(Math.min((ts - last) / 1000, 0.05));
  draw();
  last = ts;
  requestAnimationFrame(loop);
}

// ===== 初始化 =====
window.addEventListener('load', () => {
  // 自動填充已儲存的名字
  const savedName = getSavedName();
  if (savedName) {
    document.getElementById('player-name').value = savedName;
  }
});

// ===== 註冊/驗證邏輯 =====
const nameInput = document.getElementById('player-name');
const startBtn = document.getElementById('start-btn');
const nameError = document.getElementById('name-error');
const registerForm = document.getElementById('register-form');
const verifyScreen = document.getElementById('verify-screen');
const verifyName = document.getElementById('verify-name');
const verifyYes = document.getElementById('verify-yes');
const verifyNo = document.getElementById('verify-no');

let pendingName = '';

function showVerify(name) {
  pendingName = name;
  verifyName.textContent = name;
  registerForm.style.display = 'none';
  verifyScreen.classList.add('show');
}

function startGame(name) {
  playerName = name;
  savePlayerName(name); // 儲存名字
  highScore = getPlayerScore(name);
  
  initAudio(); // 初始化音效
  
  document.getElementById('register-screen').classList.add('hidden');
  playTick();
  requestAnimationFrame(ts => { last = ts; requestAnimationFrame(loop); });
}

startBtn.addEventListener('click', () => {
  const name = nameInput.value.trim();
  if (!name) { nameError.textContent = '請輸入名字'; return; }
  if (name.length > 15) { nameError.textContent = '名字最多 15 個字'; return; }
  
  const board = getLeaderboard();
  const existingPlayer = board.find(p => p.name === name);
  
  if (existingPlayer) {
    // 名字已存在，詢問是否本人
    showVerify(name);
  } else {
    // 新名字，直接開始
    startGame(name);
  }
});

verifyYes.addEventListener('click', () => {
  // 是本人，開始遊戲
  startGame(pendingName);
});

verifyNo.addEventListener('click', () => {
  // 不是本人，隱藏驗證畫面，讓使用者輸入新名字
  verifyScreen.classList.remove('show');
  registerForm.style.display = 'block';
  nameInput.value = '';
  nameError.textContent = '此名字已被使用，請輸入新的名字';
  nameInput.focus();
});

nameInput.addEventListener('keypress', e => { 
  if (e.key === 'Enter') startBtn.click(); 
});
</script>
</body>
</html>
