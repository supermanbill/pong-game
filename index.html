<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pong - 玩家對戰</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      touch-action: none;
      font-family: 'Courier New', monospace;
    }
    canvas { display: block; }
    
    /* 註冊畫面 */
    #register-screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #register-screen.hidden { display: none; }
    
    .register-box {
      background: rgba(255,255,255,0.05);
      border: 2px solid #32dcdc;
      border-radius: 16px;
      padding: 40px 50px;
      text-align: center;
    }
    
    .register-box h1 { color: #32dcdc; font-size: 32px; margin-bottom: 10px; }
    .register-box p { color: #888; margin-bottom: 30px; font-size: 14px; }
    
    .register-box input {
      width: 250px;
      padding: 15px 20px;
      font-size: 20px;
      border: 2px solid #444;
      border-radius: 8px;
      background: #111;
      color: #fff;
      text-align: center;
      outline: none;
    }
    .register-box input:focus { border-color: #32dcdc; }
    
    .register-box button {
      display: block;
      width: 250px;
      margin: 20px auto 0;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      color: #000;
      background: linear-gradient(135deg, #32dcdc, #28a8a8);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .register-box button:hover { transform: scale(1.05); }
    .register-box .error { color: #ff5050; margin-top: 15px; font-size: 14px; }
    
    /* 排行榜 */
    #leaderboard-screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 90;
    }
    #leaderboard-screen.show { display: flex; }
    
    .leaderboard-box {
      background: rgba(20,20,20,0.95);
      border: 2px solid #ffe632;
      border-radius: 16px;
      padding: 30px 40px;
      max-width: 450px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    
    .leaderboard-box h2 { color: #ffe632; font-size: 28px; text-align: center; margin-bottom: 20px; }
    .leaderboard-box .my-rank { background: rgba(50,220,220,0.15); border: 2px solid #32dcdc; border-radius: 10px; padding: 15px; margin-bottom: 20px; text-align: center; }
    .leaderboard-box .my-rank .rank-num { color: #32dcdc; font-size: 24px; font-weight: bold; }
    .leaderboard-box .my-rank .rank-score { color: #ffe632; font-size: 18px; }
    .leaderboard-box table { width: 100%; border-collapse: collapse; }
    .leaderboard-box th { color: #888; font-size: 12px; text-align: left; padding: 10px 5px; border-bottom: 1px solid #333; }
    .leaderboard-box td { color: #fff; padding: 12px 5px; border-bottom: 1px solid #222; }
    .leaderboard-box tr:nth-child(1) td { color: #ffd700; font-weight: bold; }
    .leaderboard-box tr:nth-child(2) td { color: #c0c0c0; }
    .leaderboard-box tr:nth-child(3) td { color: #cd7f32; }
    .leaderboard-box .close-btn { display: block; margin: 25px auto 0; padding: 12px 40px; font-size: 16px; color: #fff; background: #333; border: 1px solid #555; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>

<!-- 註冊畫面 -->
<div id="register-screen">
  <div class="register-box">
    <h1>🏓 PONG</h1>
    <p>請輸入你的名字開始遊戲</p>
    <input type="text" id="player-name" placeholder="你的名字" maxlength="15" autocomplete="off">
    <button id="start-btn">開始遊戲</button>
    <p class="error" id="name-error"></p>
  </div>
</div>

<!-- 排行榜畫面 -->
<div id="leaderboard-screen">
  <div class="leaderboard-box">
    <h2>🏆 排行榜</h2>
    <div class="my-rank">
      <div>你的排名：<span class="rank-num" id="rank-num">-</span></div>
      <div>本局得分：<span class="rank-score" id="rank-score">-</span></div>
    </div>
    <table>
      <thead><tr><th style="width:50px">排名</th><th>玩家</th><th style="text-align:right">總分</th></tr></thead>
      <tbody id="leaderboard-body"></tbody>
    </table>
    <button class="close-btn" id="close-leaderboard">關閉</button>
  </div>
</div>

<canvas id="c"></canvas>

<script>
// ===== 常量 =====
const W = 800, H = 600, H_CANVAS = 710;
const PW = 12, PH = 90, PSPEED = 6;
const AI_SPEED = 3.5, AI_PRED = 0.3;
const BSIZE = 12, BSINIT = 3.5, BSMAX = 8, BACC = 0.2;
const WIN_SCORE = 7;
const DPAD_W = 150, DPAD_H = 76, DPAD_GAP = 20;
const DPAD_LX = W/2 - DPAD_W - DPAD_GAP/2;
const DPAD_RX = W/2 + DPAD_GAP/2;
const DPAD_Y = H + 17;

// ===== 玩家資料 =====
let playerName = '', playerTotalScore = 0, currentRoundScore = 0;

// ===== 排行榜 =====
function getLeaderboard() { return JSON.parse(localStorage.getItem('pong-leaderboard') || '[]'); }
function saveLeaderboard(board) { localStorage.setItem('pong-leaderboard', JSON.stringify(board)); }
function updateLeaderboard(name, score) {
  let board = getLeaderboard();
  const p = board.find(x => x.name === name);
  if (p) p.score += score; else board.push({ name, score });
  board.sort((a, b) => b.score - a.score);
  saveLeaderboard(board.slice(0, 10));
}
function getPlayerRank(name) { const idx = getLeaderboard().findIndex(p => p.name === name); return idx >= 0 ? idx + 1 : null; }

// ===== Canvas =====
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H_CANVAS;

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H_CANVAS);
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H_CANVAS * s) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ===== 音效 =====
let audioCtx;
function tone(freq, dur, vol = 0.4) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    osc.start(); osc.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}
const playTick = () => tone(350, 0.09, 0.3);
const playGo = () => { tone(523, 0.06, 0.5); setTimeout(() => tone(659, 0.06, 0.5), 60); setTimeout(() => tone(784, 0.22, 0.5), 120); };
const playHit = (s) => tone(400 + s * 30, 0.07, 0.2 + s * 0.05);
const playWin = () => [523,659,784,1047].forEach((f,i) => setTimeout(() => tone(f, i===3?0.5:0.1, 0.55), i*100));
const playLose = () => [440,392,349,262].forEach((f,i) => setTimeout(() => tone(f, i===3?0.6:0.14, 0.4), i*140));

// ===== 粒子 =====
class Particle {
  constructor(x, y, dir) {
    const ang = (Math.random() - 0.5) * Math.PI * 1.1;
    const spd = 2.5 + Math.random() * 5.5;
    this.x = x; this.y = y;
    this.vx = Math.cos(ang) * spd * dir;
    this.vy = Math.sin(ang) * spd;
    this.life = 1;
    this.decay = 0.035 + Math.random() * 0.04;
    this.col = [255,255,200];
    this.size = 2 + Math.floor(Math.random() * 4);
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.25; this.vx *= 0.96;
    this.life -= this.decay;
  }
  draw() {
    if (this.life <= 0) return;
    ctx.fillStyle = `rgba(${(this.col[0]*this.life)|0},${(this.col[1]*this.life)|0},${(this.col[2]*this.life)|0},${this.life})`;
    ctx.beginPath(); ctx.arc(this.x, this.y, Math.max(1, this.size * this.life), 0, Math.PI*2); ctx.fill();
  }
}

// ===== 遊戲狀態 =====
let state = 'countdown', cdVal = 5, cdTick = 1, flashTimer = 0;
let shake = 0, winnerText = '', resultPlayed = false;
let particles = [], wallFlash = 0;

const ai = { x: 20, y: H/2 - PH/2, score: 0 };
const you = { x: W - 20 - PW, y: H/2 - PH/2, score: 0 };
const ball = { x: W/2, y: H/2, vx: BSINIT, vy: BSINIT, spd: BSINIT };

// ===== 輸入 =====
const keys = {};
let touchUp = false, touchDown = false;

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === 'Escape') showLeaderboard();
  if (state === 'gameover' && e.key === ' ') doReplay();
});
document.addEventListener('keyup', e => keys[e.key] = false);

function canvasPoint(x, y) {
  const r = canvas.getBoundingClientRect();
  return { x: (x - r.left) * (W / r.width), y: (y - r.top) * (H_CANVAS / r.height) };
}

canvas.addEventListener('mousedown', e => {
  const {x,y} = canvasPoint(e.clientX, e.clientY);
  if (state === 'gameover' && y < H) { doReplay(); return; }
  if (y >= DPAD_Y && y <= DPAD_Y + DPAD_H) {
    if (x >= DPAD_LX && x <= DPAD_LX + DPAD_W) touchUp = true;
    if (x >= DPAD_RX && x <= DPAD_RX + DPAD_W) touchDown = true;
  }
});
canvas.addEventListener('mouseup', () => { touchUp = false; touchDown = false; });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (state === 'gameover') { doReplay(); return; }
  Array.from(e.touches).forEach(t => {
    const {x,y} = canvasPoint(t.clientX, t.clientY);
    if (y >= DPAD_Y && y <= DPAD_Y + DPAD_H) {
      if (x >= DPAD_LX && x <= DPAD_LX + DPAD_W) touchUp = true;
      if (x >= DPAD_RX && x <= DPAD_RX + DPAD_W) touchDown = true;
    }
  });
}, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); touchUp = false; touchDown = false; }, { passive: false });

// ===== 遊戲邏輯 =====
function resetBall(dir = 1) {
  ball.x = W/2; ball.y = H/2;
  ball.spd = BSINIT;
  ball.vx = BSINIT * dir;
  ball.vy = BSINIT * (dir > 0 ? 1 : -1);
}

function doReplay() {
  ai.score = you.score = currentRoundScore = 0;
  particles = [];
  state = 'countdown'; cdVal = 5; cdTick = 1;
  shake = 0; winnerText = ''; resultPlayed = false; wallFlash = 0;
  resetBall(1);
  playTick();
}

function update(dt) {
  if (state === 'countdown') {
    cdTick -= dt;
    if (cdTick <= 0) { cdVal--; cdTick = 1; if (cdVal >= 0) playTick(); if (cdVal < 0) { state = 'start_flash'; flashTimer = 0.75; playGo(); } }
  } else if (state === 'start_flash') {
    flashTimer -= dt;
    if (flashTimer <= 0) state = 'playing';
  } else if (state === 'playing') {
    // AI
    if (ball.vx < 0) {
      const t = (ai.x + PW/2 - ball.x) / ball.vx;
      let py = Math.max(0, Math.min(H, ball.y + ball.vy * t * AI_PRED));
      ai.y += Math.sign(py - (ai.y + PH/2)) * Math.min(Math.abs(py - (ai.y + PH/2)), AI_SPEED);
    } else {
      ai.y += Math.sign(H/2 - (ai.y + PH/2)) * Math.min(Math.abs(H/2 - (ai.y + PH/2)), AI_SPEED);
    }
    ai.y = Math.max(0, Math.min(H - PH, ai.y));

    // 玩家
    if (keys['ArrowUp'] || touchUp) you.y -= PSPEED;
    if (keys['ArrowDown'] || touchDown) you.y += PSPEED;
    you.y = Math.max(0, Math.min(H - PH, you.y));

    // 球
    ball.x += ball.vx; ball.y += ball.vy;
    if (ball.y <= BSIZE/2 || ball.y >= H - BSIZE/2) {
      ball.vy = Math.abs(ball.vy) * (ball.y <= BSIZE/2 ? 1 : -1);
      wallFlash = 1;
    }
    wallFlash = Math.max(0, wallFlash - dt * 4);

    // 碰撞
    const br = { l: ball.x-BSIZE/2, r: ball.x+BSIZE/2, t: ball.y-BSIZE/2, b: ball.y+BSIZE/2 };
    const paddleRect = p => ({ l: p.x, r: p.x+PW, t: p.y, b: p.y+PH });
    const hit = (a, b) => a.l<b.r && a.r>b.l && a.t<b.b && a.b>b.t;

    function hitPaddle(p) {
      const rel = Math.max(-1, Math.min(1, (ball.y - (p.y+PH/2)) / (PH/2)));
      ball.spd = Math.min(ball.spd + BACC, BSMAX);
      ball.vx = -ball.spd;
      ball.vy = ball.spd * rel;
      if (p === you) currentRoundScore++;
    }

    if (hit(br, paddleRect(ai)) && ball.vx < 0) { ball.x = ai.x + PW + BSIZE/2; hitPaddle(ai); shake = 6; playHit(ball.spd); for(let i=0;i<14;i++)particles.push(new Particle(ball.x,ball.y,1)); }
    if (hit(br, paddleRect(you)) && ball.vx > 0) { ball.x = you.x - BSIZE/2; hitPaddle(you); shake = 6; playHit(ball.spd); for(let i=0;i<14;i++)particles.push(new Particle(ball.x,ball.y,-1)); }

    // 得分
    if (ball.x < 0) { you.score++; particles=[]; resetBall(1); }
    if (ball.x > W) { ai.score++; particles=[]; resetBall(-1); }

    // 結束
    if (ai.score >= WIN_SCORE && !resultPlayed) {
      winnerText = 'AI WINS!'; state = 'gameover'; resultPlayed = true; playLose();
      playerTotalScore += currentRoundScore;
      updateLeaderboard(playerName, playerTotalScore);
    }
    if (you.score >= WIN_SCORE && !resultPlayed) {
      winnerText = 'YOU WIN!'; state = 'gameover'; resultPlayed = true; playWin();
      playerTotalScore += currentRoundScore * 5;
      updateLeaderboard(playerName, playerTotalScore);
    }

    particles.forEach(p => p.update());
    particles = particles.filter(p => p.life > 0);
  }
}

// ===== 繪製 =====
function draw() {
  let ox = 0, oy = 0;
  if (shake > 0) { ox = (Math.random()-0.5)*8; oy = (Math.random()-0.5)*8; shake--; }

  ctx.save(); ctx.translate(ox, oy);
  ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);

  // 中線
  ctx.fillStyle = '#3c3c3c';
  for (let y = 0; y < H; y += 26) ctx.fillRect(W/2 - 1, y, 2, 16);

  // 牆壁閃光
  ctx.fillStyle = wallFlash > 0.05 ? `rgba(255,255,200,${wallFlash * 0.5})` : 'rgba(200,200,200,0.35)';
  ctx.fillRect(0, 0, W, 6);
  ctx.fillRect(0, H-6, W, 6);

  // 擋板
  ctx.fillStyle = '#32dcdc'; ctx.fillRect(ai.x, ai.y, PW, PH);
  ctx.fillStyle = '#ffe632'; ctx.fillRect(you.x, you.y, PW, PH);

  // 球
  if (state === 'playing' || state === 'gameover') {
    ctx.fillStyle = '#ffff00'; ctx.beginPath(); ctx.arc(ball.x, ball.y, BSIZE/2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ball.x-2, ball.y-2, 2, 0, Math.PI*2); ctx.fill();
  }

  // 粒子
  particles.forEach(p => p.draw());

  // D-Pad
  ctx.fillStyle = '#070707'; ctx.fillRect(0, H, W, H_CANVAS - H);
  [[DPAD_LX, touchUp, true], [DPAD_RX, touchDown, false]].forEach(([x, active, isUp]) => {
    ctx.fillStyle = active ? 'rgba(255,255,255,0.55)' : 'rgba(255,255,255,0.18)';
    ctx.fillRect(x, DPAD_Y, DPAD_W, DPAD_H);
    ctx.fillStyle = active ? '#ffe632' : '#999';
    const cx = x + DPAD_W/2, cy = DPAD_Y + DPAD_H/2;
    ctx.beginPath();
    if (isUp) { ctx.moveTo(cx, cy-14); ctx.lineTo(cx-20, cy+14); ctx.lineTo(cx+20, cy+14); }
    else { ctx.moveTo(cx, cy+14); ctx.lineTo(cx-20, cy-14); ctx.lineTo(cx+20, cy-14); }
    ctx.fill();
  });

  // 分數
  ctx.font = 'bold 64px monospace';
  ctx.fillStyle = '#32dcdc'; ctx.textAlign = 'right'; ctx.fillText(ai.score, W/2-80, 76);
  ctx.fillStyle = '#ffe632'; ctx.textAlign = 'left'; ctx.fillText(you.score, W/2+80, 76);
  ctx.font = '22px monospace';
  ctx.fillStyle = '#32dcdc'; ctx.textAlign = 'right'; ctx.fillText('AI', W/2-80, 106);
  ctx.fillStyle = '#ffe632'; ctx.textAlign = 'left'; ctx.fillText('You', W/2+80, 106);
  
  if (state === 'playing') {
    ctx.font = '18px monospace'; ctx.fillStyle = '#888'; ctx.textAlign = 'left'; ctx.fillText('+' + currentRoundScore, W/2+80, 136);
  }

  // 倒數/結束
  if (state === 'countdown') {
    ctx.fillStyle = 'rgba(0,0,0,0.43)'; ctx.fillRect(0,0,W,H);
    const scale = 1 + 0.25 * (cdTick / 0.25);
    ctx.save(); ctx.translate(W/2, H/2); ctx.scale(scale, scale);
    ctx.font = 'bold 130px monospace'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.fillText(Math.max(0, cdVal), 0, 55);
    ctx.restore();
  } else if (state === 'start_flash') {
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(0,0,W,H);
    ctx.font = 'bold 120px monospace'; ctx.fillStyle = '#50ff82'; ctx.textAlign = 'center'; ctx.fillText('Start!', W/2, H/2+50);
  } else if (state === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.67)'; ctx.fillRect(0,0,W,H);
    ctx.font = 'bold 62px monospace'; ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.fillText('GAME OVER', W/2, H/2-60);
    ctx.font = 'bold 34px monospace'; ctx.fillStyle = winnerText === 'YOU WIN!' ? '#50ffff' : '#ff5050'; ctx.fillText(winnerText, W/2, H/2);
    const finalScore = winnerText === 'YOU WIN!' ? currentRoundScore * 5 : currentRoundScore;
    ctx.font = '22px monospace'; ctx.fillStyle = '#ffe632'; ctx.fillText(winnerText === 'YOU WIN!' ? `得分: ${currentRoundScore} × 5 = ${finalScore}` : `得分: ${currentRoundScore}`, W/2, H/2+45);
    ctx.font = 'bold 28px monospace'; ctx.fillText('REPLAY  /  SPACE', W/2, H/2+80);
    ctx.font = '22px monospace'; ctx.fillStyle = '#3c3c3c'; ctx.fillText('RANKING / ESC', W/2, H/2+115);
  }

  ctx.font = '14px monospace'; ctx.fillStyle = '#444'; ctx.textAlign = 'left'; ctx.fillText('v1.1', 10, H-10);
  ctx.restore();
}

// ===== 迴圈 =====
let last = 0;
function loop(ts) {
  update(Math.min((ts - last) / 1000, 0.05));
  draw();
  last = ts;
  requestAnimationFrame(loop);
}

// ===== UI =====
function showLeaderboard() {
  const board = getLeaderboard();
  const tbody = document.getElementById('leaderboard-body');
  tbody.innerHTML = board.map((p, i) => `<tr><td>${i+1}</td><td>${p.name}</td><td style="text-align:right">${p.score}</td></tr>`).join('');
  document.getElementById('rank-num').textContent = getPlayerRank(playerName) || '-';
  document.getElementById('rank-score').textContent = playerTotalScore;
  document.getElementById('leaderboard-screen').classList.add('show');
}
function hideLeaderboard() { document.getElementById('leaderboard-screen').classList.remove('show'); }

document.getElementById('start-btn').addEventListener('click', () => {
  const name = document.getElementById('player-name').value.trim();
  if (!name) { document.getElementById('name-error').textContent = '請輸入名字'; return; }
  if (name.length > 15) { document.getElementById('name-error').textContent = '名字最多 15 個字'; return; }
  playerName = name;
  playerTotalScore = 0;
  document.getElementById('register-screen').classList.add('hidden');
  playTick();
  requestAnimationFrame(ts => { last = ts; requestAnimationFrame(loop); });
});
document.getElementById('close-leaderboard').addEventListener('click', hideLeaderboard);
document.getElementById('player-name').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('start-btn').click(); });
</script>
</body>
</html>
